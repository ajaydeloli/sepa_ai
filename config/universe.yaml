# Stock Universe Configuration
# Controls which symbols are scanned on every daily run.

# provider: nsepython | csv
provider: "nsepython"

# index: nifty500 | nse_all | custom
# nifty500  → ~500 symbols (recommended starting point)
# nse_all   → ~2000 symbols (slower bootstrap, more opportunities)
# custom    → reads from custom_csv path below
index: "nifty500"

# Path to custom CSV (used only when index: custom)
# CSV must have a 'symbol' column or symbols in column A, one per row.
custom_csv: ""

# Additional symbols always included regardless of universe index
# (merged with the universe; duplicates are deduplicated)
always_include:
  - RELIANCE
  - TCS
  - INFY
  - HDFCBANK
  - ICICIBANK

# Symbols to always exclude (e.g. illiquid, suspended, under investigation)
always_exclude: []

# Filters applied after symbol list is loaded
filters:
  min_price_inr: 50
  min_avg_volume: 100000
  min_market_cap_cr: 500
