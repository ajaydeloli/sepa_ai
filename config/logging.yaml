version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  brief:
    format: "[%(levelname)s] %(name)s: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/sepa_ai.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  # --- project modules: INFO --------------------------------------------------
  ingestion:
    level: INFO
    handlers: [console, file]
    propagate: false

  features:
    level: INFO
    handlers: [console, file]
    propagate: false

  rules:
    level: INFO
    handlers: [console, file]
    propagate: false

  screener:
    level: INFO
    handlers: [console, file]
    propagate: false

  storage:
    level: INFO
    handlers: [console, file]
    propagate: false

  utils:
    level: INFO
    handlers: [console, file]
    propagate: false

  pipeline:
    level: INFO
    handlers: [console, file]
    propagate: false

  paper_trading:
