universe:
  source: "yfinance"
  universe_provider: "nsepython"
  universe_csv: ""
  index: "nifty500"      # "nifty500" or "nse_all"
  min_price: 50
  min_avg_volume: 100000
  min_market_cap_cr: 500

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  features_dir: "data/features"
  fundamentals_dir: "data/fundamentals"
  news_dir: "data/news"
  # Maximum years of history to fetch when bootstrapping a new/missing symbol.
  # For newly listed symbols, whatever data is available will be fetched regardless.
  bootstrap_years: 2

watchlist:
  always_scan: true
  priority_in_reports: true
  always_generate_charts: true
  persist_path: "data/sepa_ai.db"

rs:
  # IBD-style multi-period weighted return (Minervini's preferred RS Rating source).
  # Formula: rs_raw = 0.4*(C/C_63) + 0.2*(C/C_126) + 0.2*(C/C_189) + 0.2*(C/C_252)
  # The most-recent quarter is double-weighted (0.4) to emphasise recent momentum.
  # rs_raw is then percentile-ranked across the full universe to produce a 0-99 score.
  # No benchmark division — stocks are ranked purely against each other.
  period_q1: 63     # 3-month lookback  — weight 0.4 (double-weighted, most recent)
  period_q2: 126    # 6-month lookback  — weight 0.2
  period_q3: 189    # 9-month lookback  — weight 0.2
  period_q4: 252    # 12-month lookback — weight 0.2
  # Minimum trading days required before a symbol can receive a valid RS rating.
  # Must be >= period_q4 + small buffer.  Symbols below this threshold get rating=0.
  min_rows: 254
  # Absolute minimum for the degraded IPO formula (one full quarter + buffer).
  # IPOs with >= min_ipo_rows but < min_rows receive a rating computed from
  # whatever quarterly windows are available, with weights renormalised to 1.0.
  # Below min_ipo_rows the symbol is too new for any meaningful RS — rating=0.
  min_ipo_rows: 65

trend_template:
  pct_above_52w_low: 25.0
  pct_below_52w_high: 25.0
  min_rs_rating: 70
  ma200_slope_lookback: 20
  ma50_slope_lookback: 10

vcp:
  detector: "rule_based"
  pivot_sensitivity: 15       # bars each side of a swing — 5 was too sensitive (15-22 contractions per stock; needs 2-5)
  min_contractions: 2
  max_contractions: 5
  require_declining_depth: true
  require_vol_contraction: true
  min_weeks: 3
  max_weeks: 52
  tightness_pct: 0.75   # ATR10/ATR50 compression ratio threshold (< 0.75 required)
  max_depth_pct: 50.0
  min_leg_duration_days: 5   # trading days from swing high to swing low
  min_leg_atr_multiplier: 1.0  # leg high-to-low must be >= 1x ATR at swing high; 0.0 = disabled
  max_climax_days_in_base: 2       # more than this disqualifies the base
  climax_vol_threshold: 2.5        # multiplier above 50d avg volume = climax day

fundamentals:
  source: "screener"   # "screener" | "yfinance"
  enabled: true
  hard_gate: false
  cache_days: 7
  conditions:
    min_roe: 15.0
    max_de: 1.0
    min_promoter_holding: 35.0
    min_sales_growth_yoy: 10.0

news:
  enabled: true
  cache_minutes: 30
  llm_rescore: true

scoring:
  min_score_alert: 70

  # Composite score weights — must sum to 1.0.
  weights:
    rs_rating:   0.22
    trend:       0.22
    vcp:         0.18
    volume:      0.15
    fundamental: 0.15
    sector:      0.08
    news:        0.00

  # VCP component scoring parameters.
  vcp_score:
    valid_base:               60.0   # floor score for a valid VCP
    ideal_contractions:       3      # contraction count that yields maximum bonus
    contraction_bonus_per_unit: 10.0 # points lost/gained per contraction away from ideal
    vol_bonus_strong:         20.0   # max bonus for steeply declining vol_slope (slope ≤ −0.30)
    max_bonus:                40.0   # cap on total bonus above valid_base
    partial_cap:              45.0   # max score for an unqualified VCP (must be < valid_base)
    partial_per_contraction:  15.0   # points per contraction for unqualified partial credit

  # Volume component scoring parameters.
  volume_score:
    perfect_vol_ratio:    3.0  # vol_ratio that maps to 100 on a breakout day
    acc_dist_offset:     20.0  # shift applied to acc_dist_score before scaling
    acc_dist_multiplier:  2.5  # scale factor after offset

  # Grade thresholds — score must be >= the value AND other conditions must hold.
  setup_quality_thresholds:
    a_plus: 85
    a:      70
    b:      55
    c:      40

  # Minimum trend-template conditions required per grade.
  setup_quality_conditions:
    a_plus_min_conditions: 8
    a_min_conditions:      8
    b_min_conditions:      6

paper_trading:
  enabled: true
  initial_capital: 100000
  max_positions: 10
  risk_per_trade_pct: 2.0
  slippage_pct: 0.15
  brokerage_pct: 0.05
  min_score_to_trade: 70
  min_confidence: 50
  max_hold_days: 20

backtest:
  trailing_stop_pct: 0.07

llm:
  enabled: true
  # Supported providers: groq | anthropic | openai | openrouter | nvidia | ollama
  # nvidia: set NVIDIA_API_KEY in .env  (free tier at https://build.nvidia.com)
  #         recommended models:
  #           meta/llama-3.3-70b-instruct        (default, free tier)
  #           mistralai/mistral-7b-instruct-v0.3  (fastest)
  #           nvidia/llama-3.1-nemotron-70b-instruct (highest quality)
  provider: "nvidia"
  model: "meta/llama-3.3-70b-instruct"    # llama-3.3-70b-versatile
  max_tokens: 350
  only_for_quality: ["A+", "A"]

api:
  host: "0.0.0.0"
  port: 8000
  workers: 2

dashboard:
  port: 8501

alerts:
  telegram:
    enabled: true
    min_quality: "A"
  dedup_days: 3
  dedup_score_jump: 10
  email:
    enabled: false

scheduler:
  run_time: "15:35"
  timezone: "Asia/Kolkata"
